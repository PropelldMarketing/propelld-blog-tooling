name: Manual script run

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Which script to run'
        required: true
        type: choice
        options:
          # Read-only diagnostics (safe defaults, run first)
          - audit_internal_links
          - check_url_health
          - check_facet_content
          - link_health_report
          # Refiners (produce CSVs for review, no site changes)
          - link_recommender
          - anchor_refiner
          - refine_audit_rewrites
          - preview_link_insertions
          - insert_planned_links
          - preview_insertion_plans
          - plan_insertions
          - priority_scorer
          # Direct writes to Webflow (require snapshot + --apply)
          - bulk_apply_audit
          - bulk_apply_links
          - refresh_hub_data
          - refresh_links
          - snapshot
          - publish_facet_items
          # Rollback / recovery
          - rollback
          - rollback_audit_rewrites
      apply:
        description: 'Run with --apply (actually write changes). Defaults to dry-run.'
        required: false
        type: boolean
        default: false
      extra_args:
        description: 'Extra CLI args to pass to the script (optional)'
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run ${{ inputs.script }}
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          AHREFS_API_TOKEN: ${{ secrets.AHREFS_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.apply }}" = "true" ]; then ARGS="--apply"; fi
          if [ -n "${{ inputs.extra_args }}" ]; then ARGS="$ARGS ${{ inputs.extra_args }}"; fi
          echo "FINAL ARGS: $ARGS"
          python scripts/${{ inputs.script }}.py $ARGS

      - name: Upload any output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.script }}-${{ github.run_id }}
          path: |
            out/
            snapshots/
          if-no-files-found: ignore
          retention-days: 30
